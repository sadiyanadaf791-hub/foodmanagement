<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test NGO Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; }
        .dashboard-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; margin-top: 20px; }
        .stat-box { background: #ecf0f1; padding: 15px; border-radius: 6px; text-align: center; flex: 1; margin: 0 10px; }
        .stat-box:first-child { margin-left: 0; }
        .stat-box:last-child { margin-right: 0; }
        .stat-value { font-size: 24px; font-weight: bold; color: #e74c3c; margin-bottom: 5px; }
        .stat-label { font-size: 14px; color: #7f8c8d; text-transform: uppercase; }
        .welcome-msg { font-size: 18px; margin-bottom: 30px; color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>NGO Test Environment</h1>
    
    <div class="welcome-msg">
        Welcome, <span th:text="${name}">NGO Name</span>!
    </div>

    <p>This is an isolated test page to verify routing and view resolution.</p>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-value" th:text="${totalRequests}">0</div>
            <div class="stat-label">Total Requests</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" th:text="${accepted}">0</div>
            <div class="stat-label">Accepted</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" th:text="${pending}">0</div>
            <div class="stat-label">Pending</div>
        </div>
    </div>
</div>

</body>
</html>
