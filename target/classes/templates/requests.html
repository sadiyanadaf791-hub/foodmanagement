<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requests - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar('Requests')}"></div>
    <div class="content-wrapper fade-in">
        <div th:if="${successMessage}" class="alert alert-success-custom alert-custom alert-dismissible">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error-custom alert-custom alert-dismissible">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <h4 class="mb-1" style="font-weight:700">Food Requests</h4>
        <p class="text-muted mb-4" style="font-size:14px">
            <span th:if="${currentUser.role.name() == 'NGO'}">Track your food donation requests</span>
            <span th:if="${currentUser.role.name() == 'DONOR'}">Manage incoming requests from NGOs</span>
            <span th:if="${currentUser.role.name() == 'ADMIN'}">All system requests</span>
        </p>

        <div class="panel">
            <div class="panel-body p-0">
                <div class="table-container">
                    <table class="table" th:if="${requests != null && !requests.isEmpty()}">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Food Item</th>
                            <th th:if="${currentUser.role.name() != 'NGO'}">Requested By</th>
                            <th th:if="${currentUser.role.name() != 'DONOR'}">Donor</th>
                            <th>Message</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="req, iter : ${requests}">
                            <td th:text="${iter.count}">1</td>
                            <td><strong th:text="${req.donation.foodName}">Food</strong></td>
                            <td th:if="${currentUser.role.name() != 'NGO'}" th:text="${req.ngo != null ? req.ngo.fullName : 'N/A'}">NGO</td>
                            <td th:if="${currentUser.role.name() != 'DONOR'}" th:text="${req.donation.donor != null ? req.donation.donor.fullName : 'N/A'}">Donor</td>
                            <td><span th:text="${req.message}" style="max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">-</span></td>
                            <td>
                                <span class="badge-status" th:classappend="'badge-' + ${req.status.name().toLowerCase()}" th:text="${req.status}">STATUS</span>
                            </td>
                            <td th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <div class="d-flex gap-1" th:if="${req.status.name() == 'PENDING' && currentUser.role.name() == 'DONOR'}">
                                    <form th:action="@{/requests/accept/{id}(id=${req.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn-success-sm" type="submit"><i class="fas fa-check"></i> Accept</button>
                                    </form>
                                    <form th:action="@{/requests/reject/{id}(id=${req.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn-danger-sm" type="submit"><i class="fas fa-times"></i> Reject</button>
                                    </form>
                                </div>
                                <span th:if="${req.status.name() != 'PENDING' || currentUser.role.name() != 'DONOR'}" class="text-muted">—</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:if="${requests == null || requests.isEmpty()}" class="empty-state">
                        <i class="fas fa-clipboard-list"></i><h5>No requests yet</h5><p>Requests will appear here once created.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
