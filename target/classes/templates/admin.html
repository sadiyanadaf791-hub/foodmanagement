<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar('Admin Panel')}"></div>
    <div class="content-wrapper fade-in">
        <div th:if="${successMessage}" class="alert alert-success-custom alert-custom alert-dismissible">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <!-- Overview Stats -->
        <div class="row g-4 mb-4">
            <div class="col-md-6 col-xl-3">
                <div class="stat-card green"><div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" th:text="${totalUsers}">0</div><div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="stat-card blue"><div class="stat-icon"><i class="fas fa-box-open"></i></div>
                    <div class="stat-value" th:text="${totalDonations}">0</div><div class="stat-label">Total Donations</div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="stat-card orange"><div class="stat-icon"><i class="fas fa-clipboard-check"></i></div>
                    <div class="stat-value" th:text="${totalRequests}">0</div><div class="stat-label">Total Requests</div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="stat-card red"><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="stat-value" th:text="${expiredDonations}">0</div><div class="stat-label">Expired</div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card green"><div class="stat-icon"><i class="fas fa-store"></i></div>
                    <div class="stat-value" th:text="${totalDonors}">0</div><div class="stat-label">Donors</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card purple"><div class="stat-icon"><i class="fas fa-building-ngo"></i></div>
                    <div class="stat-value" th:text="${totalNgos}">0</div><div class="stat-label">NGOs</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card blue"><div class="stat-icon"><i class="fas fa-check-double"></i></div>
                    <div class="stat-value" th:text="${acceptedRequests}">0</div><div class="stat-label">Accepted Requests</div>
                </div>
            </div>
        </div>

        <!-- User Management -->
        <div class="panel">
            <div class="panel-header"><h5><i class="fas fa-users-cog me-2"></i>User Management</h5></div>
            <div class="panel-body p-0">
                <div class="table-container">
                    <table class="table">
                        <thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Action</th></tr></thead>
                        <tbody>
                        <tr th:each="u : ${allUsers}">
                            <td><strong th:text="${u.fullName}">Name</strong></td>
                            <td th:text="${u.username}">user</td>
                            <td th:text="${u.email}">email</td>
                            <td><span class="badge-status badge-available" th:text="${u.role}">ROLE</span></td>
                            <td>
                                <span th:if="${u.enabled}" class="badge-status badge-accepted">Active</span>
                                <span th:unless="${u.enabled}" class="badge-status badge-expired">Disabled</span>
                            </td>
                            <td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <form th:action="@{/admin/users/toggle/{id}(id=${u.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button th:if="${u.enabled}" class="btn-danger-sm" type="submit"><i class="fas fa-ban"></i> Disable</button>
                                    <button th:unless="${u.enabled}" class="btn-success-sm" type="submit"><i class="fas fa-check"></i> Enable</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
