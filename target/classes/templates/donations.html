<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar('Donations')}"></div>
    <div class="content-wrapper fade-in">
        <div th:if="${successMessage}" class="alert alert-success-custom alert-custom alert-dismissible">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error-custom alert-custom alert-dismissible">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-1" style="font-weight:700">All Donations</h4>
                <p class="text-muted mb-0" style="font-size:14px">Browse and manage food donations</p>
            </div>
            <a th:if="${currentUser.role.name() == 'DONOR'}" th:href="@{/donations/new}" class="btn-primary-custom">
                <i class="fas fa-plus"></i> New Donation
            </a>
        </div>

        <!-- Search & Filter -->
        <form th:action="@{/donations}" method="get" class="search-bar">
            <input type="text" name="search" class="form-control" placeholder="Search by food name..." th:value="${search}" id="search-input">
            <select name="status" class="form-select" style="max-width:200px;border:1.5px solid #e2e8f0;border-radius:8px">
                <option value="">All Statuses</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s.name() == status}"></option>
            </select>
            <button type="submit" class="btn-primary-custom"><i class="fas fa-search"></i> Search</button>
        </form>

        <div class="panel">
            <div class="panel-body p-0">
                <div class="table-container">
                    <table class="table" th:if="${donations != null && donations.totalElements > 0}">
                        <thead>
                        <tr><th>#</th><th>Food Item</th><th>Qty</th><th>Location</th><th>Expiry</th><th>Status</th><th>Donor</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="d, iter : ${donations}">
                            <td th:text="${donations.number * donations.size + iter.count}">1</td>
                            <td>
                                <strong th:text="${d.foodName}">Food</strong>
                                <br><small class="text-muted" th:text="${d.description}" style="max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></small>
                            </td>
                            <td><span th:text="${d.quantity}">0</span> <small th:text="${d.unit}">kg</small></td>
                            <td th:text="${d.location}">Location</td>
                            <td th:text="${#temporals.format(d.expiryDate, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <span class="badge-status" th:classappend="'badge-' + ${d.status.name().toLowerCase().replace('_','-')}" th:text="${d.status}">STATUS</span>
                            </td>
                            <td th:text="${d.donor != null ? 'Donor #' + d.donor.id : 'Donor'}">Donor</td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:if="${currentUser.role.name() == 'DONOR' && d.donor.id == currentUser.id}"
                                       th:href="@{/donations/edit/{id}(id=${d.id})}" class="btn-outline-custom btn-sm-custom">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:if="${currentUser.role.name() == 'DONOR' && d.donor.id == currentUser.id && d.status.name() == 'AVAILABLE'}"
                                          th:action="@{/donations/delete/{id}(id=${d.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn-danger-sm btn-delete-confirm" type="submit"><i class="fas fa-trash"></i></button>
                                    </form>
                                    <form th:if="${currentUser.role.name() == 'NGO' && d.status.name() == 'AVAILABLE'}"
                                          th:action="@{/requests/new/{id}(id=${d.id})}" method="post" style="display:inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="message" value="We would like to collect this donation.">
                                        <button class="btn-primary-custom btn-sm-custom" type="submit"><i class="fas fa-paper-plane"></i> Request</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:if="${donations == null || donations.totalElements == 0}" class="empty-state">
                        <i class="fas fa-box-open"></i><h5>No donations found</h5><p>Try adjusting your search criteria.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${donations != null && donations.totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${donations.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/donations(page=${donations.number - 1}, search=${search}, status=${status})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, donations.totalPages - 1)}" th:classappend="${i == donations.number} ? 'active'">
                    <a class="page-link" th:href="@{/donations(page=${i}, search=${search}, status=${status})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${donations.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/donations(page=${donations.number + 1}, search=${search}, status=${status})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
