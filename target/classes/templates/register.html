<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="auth-page">
    <div class="auth-card" style="max-width:500px">
        <div class="auth-logo"><i class="fas fa-seedling"></i></div>
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join FoodBridge and help reduce food waste</p>

        <div th:if="${errorMessage}" class="alert alert-error-custom alert-custom" role="alert">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label-custom">Full Name *</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Your full name" required>
                    <small th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger"></small>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label-custom">Username *</label>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username" required>
                    <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></small>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-custom">Email *</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com" required>
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></small>
            </div>
            <div class="mb-3">
                <label class="form-label-custom">Password *</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Create a strong password" required>
            </div>
            <div class="mb-3">
                <label class="form-label-custom">Phone</label>
                <input type="text" th:field="*{phone}" class="form-control" placeholder="+1-555-0100">
            </div>
            <div class="mb-3">
                <label class="form-label-custom">I am a *</label>
                <select th:field="*{role}" class="form-select" required>
                    <option value="">Select your role</option>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label-custom">Organization Name</label>
                <input type="text" th:field="*{organizationName}" class="form-control" placeholder="Your organization">
            </div>
            <div class="mb-4">
                <label class="form-label-custom">Address</label>
                <input type="text" th:field="*{address}" class="form-control" placeholder="Your address">
            </div>
            <button type="submit" class="btn-auth">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="auth-link">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
