<!-- Sidebar Fragment -->
<div th:fragment="sidebar" class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon"><i class="fas fa-seedling"></i></div>
        <div>
            <h5>FoodBridge</h5>
            <small>Zero Hunger Platform</small>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a th:href="@{/dashboard}" class="nav-link">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a th:href="@{/donations}" class="nav-link">
            <i class="fas fa-hand-holding-heart"></i> Donations
        </a>
        <a th:href="@{/requests}" class="nav-link">
            <i class="fas fa-clipboard-list"></i> Requests
        </a>
        <a th:href="@{/pickup}" class="nav-link">
            <i class="fas fa-truck"></i> Pickup Tracking
        </a>

        <div class="nav-section">Insights</div>
        <a th:href="@{/sdg-dashboard}" class="nav-link">
            <i class="fas fa-chart-line"></i> SDG Dashboard
        </a>
        <a th:href="@{/notifications}" class="nav-link">
            <i class="fas fa-bell"></i> Notifications
        </a>

        <div th:if="${currentUser != null && currentUser.role.name() == 'ADMIN'}">
            <div class="nav-section">Administration</div>
            <a th:href="@{/admin}" class="nav-link">
                <i class="fas fa-shield-halved"></i> Admin Panel
            </a>
        </div>
    </nav>
    <div class="sidebar-footer" th:if="${currentUser != null}">
        <div class="user-info">
            <div class="user-avatar" th:text="${currentUser.fullName != null ? currentUser.fullName.substring(0,1).toUpperCase() : 'U'}"></div>
            <div>
                <div class="user-name" th:text="${currentUser.fullName}">User</div>
                <div class="user-role" th:text="${currentUser.role}">ROLE</div>
            </div>
        </div>
    </div>
</div>
