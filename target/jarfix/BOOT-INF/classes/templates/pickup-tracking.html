<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickup Tracking - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar('Pickup Tracking')}"></div>
    <div class="content-wrapper fade-in">
        <div th:if="${successMessage}" class="alert alert-success-custom alert-custom alert-dismissible">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-error-custom alert-custom alert-dismissible">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <h4 class="mb-1" style="font-weight:700"><i class="fas fa-truck me-2"></i>Pickup Tracking</h4>
        <p class="text-muted mb-4" style="font-size:14px">Track food pickup status from acceptance to completion</p>

        <div class="panel">
            <div class="panel-body p-0">
                <div class="table-container">
                    <table class="table" th:if="${pickups != null && !pickups.isEmpty()}">
                        <thead><tr><th>#</th><th>Food Item</th><th>NGO</th><th>Donor</th><th>Current Status</th><th>Scheduled</th><th>Completed</th><th>Update</th></tr></thead>
                        <tbody>
                        <tr th:each="p, iter : ${pickups}">
                            <td th:text="${iter.count}">1</td>
                            <td><strong th:text="${p.request.donation.foodName}">Food</strong></td>
                            <td th:text="${p.request.ngo.fullName}">NGO</td>
                            <td th:text="${p.request.donation.donor.fullName}">Donor</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="'badge-' + ${p.status.name().toLowerCase().replace('_','-')}"
                                      th:text="${p.status}">STATUS</span>
                            </td>
                            <td th:text="${p.scheduledTime != null ? #temporals.format(p.scheduledTime, 'dd MMM, HH:mm') : '—'}">—</td>
                            <td th:text="${p.completedTime != null ? #temporals.format(p.completedTime, 'dd MMM, HH:mm') : '—'}">—</td>
                            <td th:if="${p.status.name() != 'PICKED_UP'}">
                                <form th:action="@{/pickup/update/{id}(id=${p.id})}" method="post" class="d-flex gap-1">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <select name="status" class="form-select form-select-sm" style="width:auto;font-size:12px">
                                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == p.status}"></option>
                                    </select>
                                    <button class="btn-primary-custom btn-sm-custom" type="submit">Update</button>
                                </form>
                            </td>
                            <td th:if="${p.status.name() == 'PICKED_UP'}">
                                <span class="text-success"><i class="fas fa-check-circle"></i> Complete</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <div th:if="${pickups == null || pickups.isEmpty()}" class="empty-state">
                        <i class="fas fa-truck"></i><h5>No pickups yet</h5><p>Pickups are created when requests are accepted.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
