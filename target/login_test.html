<!DOCTYPE html>

<head>

<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-seedling"></i></div>
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Sign in to FoodBridge — Fighting hunger, reducing waste</p>

        
        

        <form action="/login" method="post"><input type="hidden" name="_csrf" value="s2qJhzUPt91Tg_xgsRNEs5NtKd9-LtFpHUfBLmuC60K5_ERk0FuxsAE3h-5-4plZ1T5w0qRbBL5NT-VEfyP0Tw3jinaBxSdT"/>

            <div class="mb-3">
                <label class="form-label-custom">Username</label>

                    <input type="text" name="username" class="form-control" placeholder="Enter your username"
                           style="border-left:0;border-radius:0 10px 10px 0" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label-custom">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="border:1.5px solid #e2e8f0;border-right:0;border-radius:10px 0 0 10px;background:#f8f9fa">
                        <i class="fas fa-lock" style="color:#6c757d"></i>
                    </span>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password"
                           style="border-left:0;border-radius:0 10px 10px 0" required>
                </div>
            </div>
            <button type="submit" class="btn-auth">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>

        <div class="auth-link">

        <div style="margin-top:24px;padding-top:18px;border-top:1px solid #e2e8f0;text-align:center;">
