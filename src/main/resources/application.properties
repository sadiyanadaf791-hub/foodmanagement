# ============================================
# Food Waste Management System - Configuration
# ============================================

# Server
server.port=8080
spring.main.allow-circular-references=true

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/food_waste_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Socket Server
socket.server.port=9090

# Async / Thread Pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.scheduling.pool.size=3

# Logging
logging.level.com.project.foodwaste=INFO
logging.level.org.springframework.security=WARN
