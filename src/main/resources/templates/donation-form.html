<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Donation - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar('Add Donation')}"></div>
    <div class="content-wrapper fade-in">
        <div th:if="${errorMessage}" class="alert alert-error-custom alert-custom">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>
        <div class="panel" style="max-width:720px">
            <div class="panel-header">
                <h5><i class="fas fa-plus-circle me-2"></i>
                    <span th:if="${donation.id == null}">Add New Donation</span>
                    <span th:if="${donation.id != null}">Edit Donation</span>
                </h5>
            </div>
            <div class="panel-body">
                <form th:action="${donation.id != null} ? @{/donations/edit/{id}(id=${donation.id})} : @{/donations/new}"
                      th:object="${donation}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label-custom">Food Name *</label>
                            <input type="text" th:field="*{foodName}" class="form-control" placeholder="e.g., Fresh Vegetable Platter" required>
                            <small th:if="${#fields.hasErrors('foodName')}" th:errors="*{foodName}" class="text-danger"></small>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label-custom">Quantity *</label>
                            <div class="input-group">
                                <input type="number" th:field="*{quantity}" class="form-control" min="1" required>
                                <select th:field="*{unit}" class="form-select" style="max-width:80px">
                                    <option value="kg">kg</option>
                                    <option value="lbs">lbs</option>
                                    <option value="pcs">pcs</option>
                                    <option value="boxes">boxes</option>
                                    <option value="plates">plates</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-custom">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Describe the food items..."></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label-custom">Expiry Date *</label>
                            <input type="date" th:field="*{expiryDate}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label-custom">Location *</label>
                            <input type="text" th:field="*{location}" class="form-control" placeholder="Pickup address" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label-custom">Food Image (optional)</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                    </div>
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-primary-custom">
                            <i class="fas fa-save"></i>
                            <span th:if="${donation.id == null}">Create Donation</span>
                            <span th:if="${donation.id != null}">Update Donation</span>
                        </button>
                        <a th:href="@{/donations}" class="btn-outline-custom">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
