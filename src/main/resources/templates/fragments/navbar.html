<!-- Navbar Fragment -->
<div th:fragment="navbar(pageTitle)" class="top-navbar">
    <div class="d-flex align-items-center gap-3">
        <button class="btn d-lg-none" id="sidebar-toggle" style="border:none;font-size:20px;color:#2c3e50">
            <i class="fas fa-bars"></i>
        </button>
        <h1 class="page-title mb-0" th:text="${pageTitle}">Dashboard</h1>
    </div>
    <div class="navbar-actions">
        <a th:href="@{/notifications}" class="nav-action-btn" title="Notifications">
            <i class="fas fa-bell"></i>
            <span class="badge-count" id="notif-badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount}">0</span>
        </a>
        <a th:href="@{/sdg-dashboard}" class="nav-action-btn" title="SDG Dashboard">
            <i class="fas fa-chart-pie"></i>
        </a>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="nav-action-btn" title="Logout" style="cursor:pointer">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </form>
    </div>
</div>
