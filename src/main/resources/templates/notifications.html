<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - FoodBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar('Notifications')}"></div>
    <div class="content-wrapper fade-in">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-1" style="font-weight:700">Notifications</h4>
                <p class="text-muted mb-0" style="font-size:14px">Stay updated with the latest activity</p>
            </div>
            <form th:action="@{/notifications/read-all}" method="post" th:if="${notifications != null && !notifications.isEmpty()}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn-outline-custom btn-sm-custom" type="submit"><i class="fas fa-check-double"></i> Mark All Read</button>
            </form>
        </div>

        <div class="panel">
            <div class="panel-body p-0">
                <div th:if="${notifications != null && !notifications.isEmpty()}">
                    <div th:each="n : ${notifications}" class="notification-item" th:classappend="${!n.read} ? 'unread'">
                        <div class="notification-icon"
                             th:classappend="${n.type == 'REQUEST'} ? 'request' : (${n.type == 'ACCEPTED'} ? 'accepted' : (${n.type == 'REJECTED'} ? 'rejected' : (${n.type == 'EXPIRY'} ? 'expiry' : (${n.type == 'PICKUP'} ? 'pickup' : 'info'))))">
                            <i th:classappend="${n.type == 'REQUEST'} ? 'fas fa-inbox' : (${n.type == 'ACCEPTED'} ? 'fas fa-check-circle' : (${n.type == 'REJECTED'} ? 'fas fa-times-circle' : (${n.type == 'EXPIRY'} ? 'fas fa-clock' : (${n.type == 'PICKUP'} ? 'fas fa-truck' : 'fas fa-info-circle'))))" class=""></i>
                        </div>
                        <div style="flex:1">
                            <div class="d-flex justify-content-between">
                                <strong style="font-size:14px" th:text="${n.title}">Title</strong>
                                <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">Time</small>
                            </div>
                            <p class="mb-0 text-muted" style="font-size:13px" th:text="${n.message}">Message</p>
                        </div>
                        <form th:if="${!n.read}" th:action="@{/notifications/read/{id}(id=${n.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn-outline-custom btn-sm-custom" type="submit" style="padding:4px 10px;font-size:11px">Mark Read</button>
                        </form>
                    </div>
                </div>
                <div th:if="${notifications == null || notifications.isEmpty()}" class="empty-state">
                    <i class="fas fa-bell-slash"></i><h5>No notifications</h5><p>You're all caught up!</p>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
